<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title>환영합니다</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      position: relative;
    }

    .btn-map {
      background-color: #2db400;
      color: white;
      padding: 10px 20px;
      font-size: 16px;
      text-decoration: none;
      border-radius: 5px;
      border: none;
      cursor: pointer;
    }

    .btn-map:hover {
      background-color: #239a00;
    }

    /* 오른쪽 상단에 프로필 사진 표시 */
    .profile-img {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      object-fit: cover;
    }
  </style>
</head>
<body>
<!-- 로그인된 사용자만 프로필 사진 표시 -->
<div sec:authorize="isAuthenticated()">
  <a th:href="@{/mypage}">
    <img th:src="${profileImageUrl}"
         alt="Profile"
         class="profile-img"/>
  </a>
</div>

<h1 th:text="'환영합니다, ' + ${name} + '님!'">환영합니다!</h1>

<a th:href="@{/map}">
  <button class="btn-map">지도 보기</button>
</a>
<a th:href="@{/users}">
  <button class="btn-map" style="margin-left:8px;">사용자 목록</button>
</a>
<a th:href="@{/plans/new}">
  <button class="btn-map" style="margin-left:8px; margin-top:16px;">새 플랜 만들기</button>
</a>
</body>
</html>
