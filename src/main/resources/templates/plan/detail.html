<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

  <title th:text="${plan.title} + ' 상세'">플랜 상세</title>
</head>
<body>
<h1 th:text="${plan.title}">플랜 제목</h1>

</body>
</html>
